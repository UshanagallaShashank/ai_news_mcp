# ============================================================
# GCP Cloud Build — CI/CD Pipeline
# ============================================================
# Automatically builds and deploys when you push to GitHub.
#
# Setup:
#   1. Enable APIs: Cloud Build, Cloud Run, Container Registry
#      gcloud services enable cloudbuild.googleapis.com run.googleapis.com
#   2. Connect your GitHub repo in Cloud Build console
#   3. Set trigger: push to main branch → run this file
#   4. Set secret environment variables in Secret Manager
#
# Cost: Cloud Build has 120 free build-minutes/day.
#       Cloud Run has a generous free tier (2M requests/month).
# ============================================================

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --tag
      - "gcr.io/$PROJECT_ID/ai-news-bot:$COMMIT_SHA"
      - --tag
      - "gcr.io/$PROJECT_ID/ai-news-bot:latest"
      - "."           # Build context = API/ folder (where this pipeline runs)
    dir: "API"        # Run from the API directory

  # Step 2: Push image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/ai-news-bot:$COMMIT_SHA"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ai-news-bot                                        # Service name
      - --image=gcr.io/$PROJECT_ID/ai-news-bot:$COMMIT_SHA
      - --region=us-central1                               # Free tier region
      - --platform=managed
      - --allow-unauthenticated                            # Allow public access
      - --port=8080
      - --memory=512Mi                                     # 512MB RAM
      - --cpu=1
      - --min-instances=0                                  # Scale to zero = FREE when idle!
      - --max-instances=3
      - --timeout=300                                      # 5min timeout (for long scraping)
      # Load secrets from Secret Manager (set these up once):
      - --set-secrets=TELEGRAM_TOKEN=TELEGRAM_TOKEN:latest
      - --set-secrets=TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest
      - --set-secrets=WEBHOOK_URL=WEBHOOK_URL:latest

# Store the built images
images:
  - "gcr.io/$PROJECT_ID/ai-news-bot:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/ai-news-bot:latest"

options:
  logging: CLOUD_LOGGING_ONLY   # Send build logs to Cloud Logging
